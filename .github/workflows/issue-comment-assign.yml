name: Issue Comment Assignment

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

concurrency:
  group: issue-comment-assign-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  assign:
    if: |
      github.event.issue.pull_request == null &&
      github.event.issue.state == 'open' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Assign issue to commenter
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const username = comment.user.login;

            if ((comment.body || '').trim().toLowerCase() !== '-assign') {
              return;
            }

            if ((issue.assignees || []).length > 0) {
              const assigned = issue.assignees.map(assignee => `@${assignee.login}`).join(', ');
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `Hi @${username}, this issue is already assigned to ${assigned}.`
              });
              return;
            }

            try {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number,
                assignees: [username]
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `Assigned to @${username}. Thanks for picking this up.`
              });
            } catch (error) {
              core.warning(`Could not assign @${username}: ${error.message}`);
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `Hi @${username}, I could not assign this issue automatically. A maintainer can assign it manually.`
              });
            }
